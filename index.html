<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizza Bliss • Premium Delivery</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0b0b0c;
      --card:#151518;
      --text:#f5f5f5;
      --muted:#a1a1aa;
      --accent:#ff6a3d;
      --accent2:#ffb36b;
    }

    body.light{
      --bg:#f5f5f5;
      --card:#ffffff;
      --text:#111;
      --muted:#555;
    }

    *{box-sizing:border-box}

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 30px;
      position:sticky;
      top:0;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.4);
    }

    nav h1{
      font-size:1.4rem;
      background: linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;
      color:transparent;
    }

    .toggle-btn{
      padding:8px 15px;
      border-radius:20px;
      border:none;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      color:white;
      cursor:pointer;
      font-size:0.8rem;
    }

    .hero{
      height:70vh;
      background:url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092?q=80&w=1600&auto=format&fit=crop');
      background-size:cover;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      position:relative;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.5);
    }

    .hero-content{position:relative;z-index:1}

    .btn{
      padding:10px 20px;
      border-radius:25px;
      background: linear-gradient(90deg,var(--accent),var(--accent2));
      border:none;
      color:white;
      cursor:pointer;
    }

    .section{padding:40px 20px}

    .container {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      max-width:1100px;
      margin:auto;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
      transition:0.3s;
    }

    .card:hover{transform:scale(1.05)}

    .card img{width:100%;height:200px;object-fit:cover}

    .card-content{padding:15px}

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:10px;
      max-width:1000px;
      margin:auto;
    }

    .gallery img{width:100%;height:150px;object-fit:cover;border-radius:10px}

    footer{text-align:center;padding:20px;color:var(--muted)}
  </style>
</head>
<body>

  <nav>
    <h1>🍕 Pizza Bliss</h1>
    <button class="toggle-btn" onclick="toggleMode()">Dark Mode</button>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <h2>Premium Pizza Delivered</h2>
      <button class="btn">Order Now</button>
    </div>
  </section>

  <section class="section">
    <div class="container">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1601924928353-22dc7c9f9d7a?q=80&w=800&auto=format&fit=crop">
        <div class="card-content">
          <h3>Margherita</h3>
          <p>Fresh & cheesy</p>
          <div>₹199</div>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1548365328-9f547fb0953c?q=80&w=800&auto=format&fit=crop">
        <div class="card-content">
          <h3>Pepperoni</h3>
          <p>Spicy delight</p>
          <div>₹299</div>
        </div>
      </div>

    </div>
  </section>

  <section class="section">
    <div class="gallery">
      <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=500">
      <img src="https://images.unsplash.com/photo-1593560708920-61dd98c46a4e?q=80&w=500">
      <img src="https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=500">
    </div>
  </section>

  <footer>© 2026 Pizza Bliss</footer>

  <script>
    function toggleMode(){
      document.body.classList.toggle('light');
    }

    window.watsonAssistantChatOptions = {
      integrationID: "ab98eaf7-51c7-47d8-a18e-fd527707e70c",
      region: "us-south",
      serviceInstanceID: "6cae505b-a9e0-420a-bb9c-f5cd58d2d2c2",
      onLoad: async (instance) => { await instance.render(); }
    };
    setTimeout(function(){
      const t=document.createElement('script');
      t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
      document.head.appendChild(t);
    });
  </script>

</body>
</html>

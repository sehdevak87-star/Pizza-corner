<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizza Bliss</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #ff4d4d, #ff944d);
      -webkit-background-clip: text;
      color: transparent;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card h3 {
      margin: 0;
      color: #ff944d;
    }

    .card p {
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .price {
      margin-top: 10px;
      font-weight: bold;
    }

    .btn {
      margin-top: 10px;
      display: inline-block;
      padding: 10px 15px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(90deg, #ff4d4d, #ff944d);
      color: white;
      cursor: pointer;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      opacity: 0.8;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 0.8rem;
      opacity: 0.6;
    }

  </style>
</head>
<body>

  <header>🍕 Pizza Bliss</header>

  <div class="container">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1601924928353-22dc7c9f9d7a" alt="Pizza">
      <div class="card-content">
        <h3>Margherita</h3>
        <p>Classic delight with fresh tomatoes & cheese</p>
        <div class="price">₹199</div>
        <a href="#" class="btn">Order Now</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1548365328-9f547fb0953c" alt="Pizza">
      <div class="card-content">
        <h3>Pepperoni</h3>
        <p>Loaded with spicy pepperoni & mozzarella</p>
        <div class="price">₹299</div>
        <a href="#" class="btn">Order Now</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1594007654729-407eedc4fe24" alt="Pizza">
      <div class="card-content">
        <h3>Veggie Supreme</h3>
        <p>Fresh veggies with cheesy goodness</p>
        <div class="price">₹249</div>
        <a href="#" class="btn">Order Now</a>
      </div>
    </div>

  </div>

  <footer>
    © 2026 Pizza Bliss | Designed with 🍕
  </footer>

  <!-- Watson Assistant Chat -->
  <script>
    window.watsonAssistantChatOptions = {
      integrationID: "ab98eaf7-51c7-47d8-a18e-fd527707e70c",
      region: "us-south",
      serviceInstanceID: "6cae505b-a9e0-420a-bb9c-f5cd58d2d2c2",
      onLoad: async (instance) => { await instance.render(); }
    };
    setTimeout(function(){
      const t=document.createElement('script');
      t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
      document.head.appendChild(t);
    });
  </script>

</body>
</html>

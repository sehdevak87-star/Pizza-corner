<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza Bliss • Final Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b0b0c;
--card:#151518;
--text:#f5f5f5;
--muted:#a1a1aa;
--accent:#c97b4f;
}

body.light{
--bg:#f5f5f5;
--card:#ffffff;
--text:#111;
--muted:#555;
}

*{margin:0;padding:0;box-sizing:border-box}

body{font-family:Poppins,sans-serif;background:var(--bg);color:var(--text);}

nav{display:flex;justify-content:space-between;padding:15px 30px;background:#111}
nav h1{color:var(--accent)}

.toggle-btn{background:var(--accent);color:white;border:none;padding:8px 15px;border-radius:20px;cursor:pointer}

.hero{
height:80vh;
background:url('https://images.pexels.com/photos/825661/pexels-photo-825661.jpeg?auto=compress&cs=tinysrgb&w=1600') center/cover;
display:flex;align-items:center;justify-content:center;text-align:center}
.hero h2{font-size:3rem}

.section{padding:40px}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}

.card{background:var(--card);border-radius:15px;overflow:hidden;transition:.3s}
.card:hover{transform:scale(1.05)}
.card img{width:100%;height:200px;object-fit:cover}
.card-content{padding:10px}

.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.gallery img{width:100%;height:150px;object-fit:cover;border-radius:10px}

.cart{position:fixed;right:-300px;top:0;width:300px;height:100%;background:#111;padding:20px;transition:.3s}
.cart.active{right:0}
.cart-btn{position:fixed;bottom:20px;right:20px;background:var(--accent);padding:15px;border-radius:50%;cursor:pointer}

footer{text-align:center;padding:20px}
.credit{color:var(--accent)}
</style>
</head>

<body>

<nav>
<h1>🍕 Pizza Bliss</h1>
<div>
<button class="toggle-btn" onclick="toggleMode()">Dark Mode</button>
<button class="toggle-btn" onclick="toggleCart()">Cart</button>
</div>
</nav>

<div class="hero">
<h2>Delicious Pizza Delivered</h2>
</div>

<section class="section">
<div class="container" id="menu"></div>
</section>

<section class="section">
<div class="gallery">
<img src="https://images.pexels.com/photos/825661/pexels-photo-825661.jpeg">
<img src="https://images.pexels.com/photos/4109084/pexels-photo-4109084.jpeg">
<img src="https://images.pexels.com/photos/2147491/pexels-photo-2147491.jpeg">
<img src="https://images.pexels.com/photos/2619967/pexels-photo-2619967.jpeg">
<img src="https://images.pexels.com/photos/1437267/pexels-photo-1437267.jpeg">
</div>
</section>

<div class="cart" id="cart">
<h2>Cart</h2>
<ul id="cart-items"></ul>
<p id="total"></p>
</div>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<footer>
© 2026 Pizza Bliss<br>
<span class="credit">✨ Made by Rishi</span>
</footer>

<script>
const pizzas=[
{name:"Margherita",price:199,img:"https://images.pexels.com/photos/825661/pexels-photo-825661.jpeg"},
{name:"Pepperoni",price:299,img:"https://images.pexels.com/photos/4109084/pexels-photo-4109084.jpeg"},
{name:"Veggie",price:249,img:"https://images.pexels.com/photos/2147491/pexels-photo-2147491.jpeg"},
{name:"Cheese Burst",price:349,img:"https://images.pexels.com/photos/2619967/pexels-photo-2619967.jpeg"}
];

const menu=document.getElementById('menu');
const cartItems=document.getElementById('cart-items');
let cart=[];

pizzas.forEach((p,i)=>{
menu.innerHTML+=`<div class="card"><img src="${p.img}"><div class="card-content"><h3>${p.name}</h3><p>₹${p.price}</p><button class="toggle-btn" onclick="addToCart(${i})">Add</button></div></div>`;
});

function addToCart(i){cart.push(pizzas[i]);renderCart();}

function renderCart(){
cartItems.innerHTML='';let total=0;
cart.forEach(p=>{total+=p.price;cartItems.innerHTML+=`<li>${p.name} - ₹${p.price}</li>`});
document.getElementById('total').innerText='Total ₹'+total;
}

function toggleCart(){document.getElementById('cart').classList.toggle('active');}
function toggleMode(){document.body.classList.toggle('light');}

// Watson Assistant
window.watsonAssistantChatOptions={
integrationID:"ab98eaf7-51c7-47d8-a18e-fd527707e70c",
region:"us-south",
serviceInstanceID:"6cae505b-a9e0-420a-bb9c-f5cd58d2d2c2",
onLoad:async(instance)=>{await instance.render();}
};
setTimeout(()=>{
const t=document.createElement('script');
t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/"+(window.watsonAssistantChatOptions.clientVersion||'latest')+"/WatsonAssistantChatEntry.js";
document.head.appendChild(t);
});
</script>

</body>
</html>
